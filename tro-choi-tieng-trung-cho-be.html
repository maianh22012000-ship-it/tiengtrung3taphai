<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐼 Đảo Phiêu Lưu Tiếng Trung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#8ed3f7; --sky2:#eaf8ff;
    --coral:#ff6f6f; --sun:#ffce3d; --grass:#57d68a; --sea:#4bc3e0;
    --grape:#b18cf2; --peach:#ffb37b; --pink:#ff8fc7; --teal:#2bd9c9; --indigo:#7c8cff;
    --ink:#2d2a4a; --ink-soft:#5c5878; --cream:#fffdf6; --white:#ffffff;
    --shadow:0 12px 28px rgba(45,42,74,0.18); --radius:28px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; font-family:'Quicksand',system-ui,sans-serif; color:var(--ink);
    min-height:100vh; overflow-x:hidden;
    background:linear-gradient(180deg,var(--sky1) 0%, var(--sky2) 55%, #fff9ec 100%);
    position:relative;
  }
  h1,h2,h3,.display{ font-family:'Baloo 2',system-ui,sans-serif; }

  /* ── Floating background decor ── */
  .cloud{ position:fixed; opacity:.85; pointer-events:none; z-index:0; animation:drift 40s linear infinite; }
  .cloud svg{ display:block; }
  .cloud.c1{ top:6%; left:-10%; width:160px; animation-duration:55s; }
  .cloud.c2{ top:16%; left:60%; width:110px; animation-duration:70s; animation-delay:-20s; }
  .cloud.c3{ top:3%; left:35%; width:90px; animation-duration:48s; animation-delay:-10s; }
  @keyframes drift{ from{ transform:translateX(0);} to{ transform:translateX(140vw);} }
  .twinkle{ position:fixed; font-size:1.2rem; opacity:.7; animation:twinkle 3s ease-in-out infinite; pointer-events:none; z-index:0;}
  @keyframes twinkle{ 0%,100%{ opacity:.25; transform:scale(.85);} 50%{ opacity:.9; transform:scale(1.1);} }

  /* ── Top bar ── */
  .topbar{
    position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:12px;
    padding:10px 18px; background:rgba(255,255,255,.72); backdrop-filter:blur(8px);
    box-shadow:0 4px 16px rgba(45,42,74,.08);
  }
  .topbar .mascot-mini{ font-size:1.8rem; }
  .topbar .brand{ font-weight:700; font-size:1.15rem; color:var(--ink); flex:1; }
  .topbar .brand small{ display:block; font-family:'Quicksand'; font-weight:600; font-size:.7rem; color:var(--ink-soft); }
  .trophy-badge{
    display:flex; align-items:center; gap:6px; background:var(--white); border-radius:999px;
    padding:6px 14px; font-weight:700; box-shadow:var(--shadow); font-size:.95rem;
  }
  .reset-btn{
    border:none; background:transparent; color:var(--ink-soft); font-family:'Quicksand'; font-weight:600;
    font-size:.75rem; cursor:pointer; text-decoration:underline; padding:4px;
  }

  main{ position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:20px 16px 60px; }

  /* ── HOME / MAP VIEW ── */
  #home-view .intro{ text-align:center; margin:10px 0 30px; }
  #home-view .intro .mascot-big{ font-size:4.2rem; display:inline-block; animation:bob 3s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0) rotate(-3deg);} 50%{ transform:translateY(-10px) rotate(3deg);} }
  #home-view .intro h1{ font-size:1.9rem; margin:8px 0 4px; color:var(--ink); }
  #home-view .intro p{ margin:0; color:var(--ink-soft); font-weight:600; }
  .speech-bubble{
    display:inline-block; background:var(--white); border-radius:18px; padding:8px 16px; margin-top:10px;
    box-shadow:var(--shadow); font-weight:700; color:var(--coral); position:relative;
  }

  .world-path{ display:flex; flex-wrap:wrap; justify-content:center; gap:22px 16px; padding:10px 0; }
  .world-card{
    width:190px; border:none; border-radius:26px; padding:20px 14px 16px; cursor:pointer;
    background:var(--white); box-shadow:var(--shadow); text-align:center; position:relative;
    transition:transform .18s ease, box-shadow .18s ease; font-family:'Quicksand';
  }
  .world-card:nth-child(2n){ transform:translateY(16px); }
  .world-card:nth-child(2n):hover{ transform:translateY(10px) scale(1.04); }
  .world-card:hover{ transform:translateY(-6px) scale(1.04); box-shadow:0 16px 32px rgba(45,42,74,.24); }
  .world-card .badge-num{
    position:absolute; top:10px; left:12px; font-size:.7rem; font-weight:800; color:#fff;
    background:rgba(0,0,0,.18); border-radius:999px; padding:2px 8px;
  }
  .world-card .icon-wrap{
    width:78px; height:78px; margin:6px auto 10px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:2.4rem; box-shadow:inset 0 -6px 0 rgba(0,0,0,.08);
  }
  .world-card .title-vi{ font-family:'Baloo 2'; font-weight:700; font-size:1.05rem; color:var(--ink); margin:0; }
  .world-card .title-cn{ font-size:.82rem; color:var(--ink-soft); font-weight:600; margin:2px 0 10px; }
  .world-card .stars{ font-size:1rem; letter-spacing:2px; margin-bottom:8px; }
  .world-card .stars .off{ opacity:.25; }
  .world-card .play-pill{
    display:inline-block; font-weight:700; font-size:.82rem; color:#fff; border-radius:999px;
    padding:6px 18px; box-shadow:0 4px 10px rgba(0,0,0,.15);
  }

  /* ── TOPIC VIEW ── */
  #topic-view{ display:none; }
  .topic-header{
    display:flex; align-items:center; gap:14px; margin-bottom:16px; flex-wrap:wrap;
  }
  .back-btn{
    border:none; background:var(--white); box-shadow:var(--shadow); border-radius:999px;
    padding:10px 18px; font-family:'Quicksand'; font-weight:700; cursor:pointer; color:var(--ink);
  }
  .back-btn:hover{ background:#fff5e9; }
  .topic-title-wrap .th-cn{ font-size:.85rem; color:var(--ink-soft); font-weight:700; }
  .topic-title-wrap h2{ margin:0; font-size:1.5rem; }

  .mode-tabs{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .mode-tab{
    border:none; padding:9px 16px; border-radius:999px; font-family:'Quicksand'; font-weight:700;
    cursor:pointer; background:#fff; color:var(--ink-soft); box-shadow:0 3px 10px rgba(45,42,74,.08);
    font-size:.85rem;
  }
  .mode-tab.active{ color:#fff; box-shadow:0 6px 16px rgba(45,42,74,.22); }

  .game-panel{
    background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px;
    min-height:320px;
  }

  /* Flashcards */
  .flash-wrap{ display:flex; flex-direction:column; align-items:center; gap:16px; }
  .flash-card{
    width:100%; max-width:340px; height:220px; perspective:1200px; cursor:pointer;
  }
  .flash-inner{
    position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d;
    border-radius:22px; box-shadow:0 10px 24px rgba(45,42,74,.18);
  }
  .flash-card.flipped .flash-inner{ transform:rotateY(180deg); }
  .flash-face{
    position:absolute; inset:0; border-radius:22px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; backface-visibility:hidden; padding:14px; text-align:center;
  }
  .flash-front{ background:linear-gradient(160deg,#fff,#fff3e0); }
  .flash-front .emoji{ font-size:3.4rem; margin-bottom:8px; }
  .flash-front .hz{ font-size:2rem; font-weight:800; color:var(--ink); font-family:'Baloo 2'; }
  .flash-back{ background:linear-gradient(160deg,#fff2f8,#eef7ff); transform:rotateY(180deg); }
  .flash-back .py{ font-size:1.3rem; font-weight:700; color:var(--coral); margin-bottom:6px; }
  .flash-back .vi{ font-size:1.1rem; font-weight:700; color:var(--ink); }
  .flash-hint{ font-size:.78rem; color:var(--ink-soft); font-weight:600; }
  .flash-nav{ display:flex; align-items:center; gap:14px; }
  .nav-btn{
    border:none; width:42px; height:42px; border-radius:50%; background:var(--sun); color:#442; font-weight:800;
    font-size:1.1rem; cursor:pointer; box-shadow:var(--shadow);
  }
  .flash-dots{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:280px; }
  .flash-dots span{ width:8px; height:8px; border-radius:50%; background:#e4dfd2; display:inline-block; }
  .flash-dots span.on{ background:var(--coral); }

  /* Match game */
  .match-grid{ display:grid; grid-template-columns:1fr 1fr; gap:26px; }
  .match-col{ display:flex; flex-direction:column; gap:10px; }
  .tile{
    border:2.5px solid #eee1cf; background:#fff; border-radius:16px; padding:12px; cursor:pointer;
    font-weight:700; text-align:center; transition:.15s; font-size:1rem;
  }
  .tile .em{ font-size:1.7rem; }
  .tile:hover{ border-color:var(--sea); }
  .tile.selected{ border-color:var(--sun); background:#fff8e0; }
  .tile.matched{ border-color:var(--grass); background:#e8fbf0; color:#2c8f5a; cursor:default; opacity:.7; }
  .tile.wrongflash{ border-color:var(--coral); background:#ffecec; }

  /* Quiz */
  .quiz-progress{ font-weight:700; color:var(--ink-soft); margin-bottom:6px; font-size:.9rem; }
  .quiz-prompt{ text-align:center; margin-bottom:18px; }
  .quiz-prompt .qp-emoji{ font-size:3rem; }
  .quiz-prompt .qp-main{ font-size:1.6rem; font-weight:800; font-family:'Baloo 2'; color:var(--ink); }
  .quiz-prompt .qp-sub{ color:var(--coral); font-weight:700; }
  .quiz-options{ display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:520px; margin:0 auto; }
  .opt-btn{
    border:2.5px solid #eee1cf; background:#fff; border-radius:16px; padding:14px; cursor:pointer;
    font-weight:700; font-size:1.02rem; transition:.15s;
  }
  .opt-btn:hover{ border-color:var(--sea); }
  .opt-btn.correct{ border-color:var(--grass); background:#e8fbf0; color:#2c8f5a; }
  .opt-btn.wrong{ border-color:var(--coral); background:#ffecec; color:#c0392b; }
  .opt-btn[disabled]{ cursor:default; }

  /* Count game */
  .count-emojis{ font-size:2.2rem; letter-spacing:6px; text-align:center; margin:14px 0 20px; min-height:60px; }

  /* Order game */
  .order-track{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:22px; min-height:44px; }
  .order-track .slot{
    min-width:64px; height:44px; border:2px dashed #e4dfd2; border-radius:12px; display:flex;
    align-items:center; justify-content:center; font-weight:800; font-size:1.3rem; color:var(--ink-soft);
  }
  .order-track .slot.filled{ border-style:solid; border-color:var(--grass); background:#e8fbf0; }
  .order-pool{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .order-card{
    border:2.5px solid #eee1cf; background:#fff; border-radius:16px; padding:10px 14px; cursor:pointer;
    text-align:center; font-weight:700; transition:.15s;
  }
  .order-card .em{ font-size:1.6rem; display:block; }
  .order-card:hover{ border-color:var(--sea); transform:translateY(-2px); }
  .order-card.used{ opacity:.25; pointer-events:none; }
  .order-card.shake{ animation:shake .35s; border-color:var(--coral); }
  @keyframes shake{ 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

  /* Shop game */
  .shop-prompt{ text-align:center; margin-bottom:16px; font-weight:800; font-size:1.15rem; font-family:'Baloo 2'; }
  .shop-prompt .sp-cn{ color:var(--coral); }
  .shop-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:420px; margin:0 auto; }
  .shop-item{
    border:2.5px solid #eee1cf; background:#fff; border-radius:16px; padding:14px 6px; cursor:pointer;
    text-align:center; transition:.15s;
  }
  .shop-item .em{ font-size:2.1rem; display:block; margin-bottom:4px; }
  .shop-item:hover{ border-color:var(--sea); transform:translateY(-2px); }
  .shop-item.correct{ border-color:var(--grass); background:#e8fbf0; }
  .shop-item.wrong{ border-color:var(--coral); background:#ffecec; }
  .shop-cart{ text-align:center; font-weight:700; color:var(--ink-soft); margin-top:14px; }

  /* Sentence quiz */
  .sentence-situation{
    background:#fff8e0; border-radius:16px; padding:14px 18px; font-weight:700; margin-bottom:16px;
    text-align:center; color:var(--ink);
  }
  .sentence-options{ display:flex; flex-direction:column; gap:10px; max-width:440px; margin:0 auto; }

  /* Result panel */
  .result-panel{ text-align:center; }
  .result-panel .stars-big{ font-size:2.6rem; margin:8px 0; }
  .result-panel .score-line{ font-weight:700; color:var(--ink-soft); margin-bottom:14px; }
  .result-panel .cheer{ font-family:'Baloo 2'; font-size:1.3rem; color:var(--coral); margin-bottom:16px; }
  .action-row{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .pill-btn{
    border:none; border-radius:999px; padding:12px 22px; font-weight:800; cursor:pointer; font-family:'Quicksand';
    box-shadow:var(--shadow); font-size:.95rem;
  }
  .pill-btn.primary{ background:var(--coral); color:#fff; }
  .pill-btn.secondary{ background:#fff; color:var(--ink); }

  /* Confetti */
  #confetti-layer{ position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; }
  .confetto{ position:absolute; top:-20px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(600deg); opacity:.9; } }

  @media(max-width:640px){
    .match-grid{ gap:14px; }
    .quiz-options{ grid-template-columns:1fr; }
    .world-card:nth-child(2n){ transform:none; }
    .world-card:nth-child(2n):hover{ transform:translateY(-6px) scale(1.04); }
    #home-view .intro h1{ font-size:1.5rem; }
  }
</style>
</head>
<body>

<div id="confetti-layer"></div>

<div class="topbar">
  <span class="mascot-mini">🐼</span>
  <div class="brand">Đảo Phiêu Lưu Tiếng Trung<small>汉语冒险岛 · Học mà chơi, chơi mà học</small></div>
  <div class="trophy-badge">🏆 <span id="total-stars">0</span>/27</div>
  <button class="reset-btn" id="reset-progress">Làm lại từ đầu</button>
</div>

<main>

  <section id="home-view">
    <div class="intro">
      <div class="mascot-big">🐼</div>
      <h1>Chào bạn nhỏ! Cùng khám phá 9 hòn đảo nhé!</h1>
      <p>Bấm vào một hòn đảo để bắt đầu chơi và học tiếng Trung nào 🎈</p>
      <div class="speech-bubble" id="home-cheer">你好！Chúng mình cùng chơi nhé! 🌟</div>
    </div>
    <div class="world-path" id="world-path"></div>
  </section>

  <section id="topic-view">
    <div class="topic-header">
      <button class="back-btn" id="back-btn">⬅️ Bản đồ</button>
      <div class="topic-title-wrap">
        <div class="th-cn" id="topic-cn"></div>
        <h2 id="topic-title"></h2>
      </div>
    </div>
    <div class="mode-tabs" id="mode-tabs"></div>
    <div class="game-panel" id="game-panel"></div>
  </section>

</main>

<script>
/* =========================================================
   DECOR: clouds + twinkles
   ========================================================= */
const decorLayer = document.body;
[["6%","-10%"],["16%","60%"],["3%","35%"]].forEach(()=>{});
function makeCloud(cls){
  const d = document.createElement('div'); d.className = 'cloud ' + cls;
  d.innerHTML = '<svg viewBox="0 0 200 100" width="100%"><ellipse cx="60" cy="60" rx="55" ry="32" fill="#ffffff"/><ellipse cx="110" cy="45" rx="45" ry="30" fill="#ffffff"/><ellipse cx="150" cy="65" rx="40" ry="26" fill="#ffffff"/></svg>';
  return d;
}
document.body.appendChild(makeCloud('c1'));
document.body.appendChild(makeCloud('c2'));
document.body.appendChild(makeCloud('c3'));
const twinkleEmojis = ['⭐','✨','🌟'];
for(let i=0;i<10;i++){
  const t = document.createElement('div');
  t.className = 'twinkle';
  t.textContent = twinkleEmojis[i % twinkleEmojis.length];
  t.style.left = (Math.random()*94+2) + 'vw';
  t.style.top = (Math.random()*70+4) + 'vh';
  t.style.animationDelay = (Math.random()*3) + 's';
  document.body.appendChild(t);
}

/* =========================================================
   DATA: 9 chủ đề (topics)
   ========================================================= */
const topics = [
  { id:'colors', icon:'🎨', color:'#ff6f6f', title:'Màu sắc', cn:'颜色 · Yánsè', modes:['cards','match','quiz'],
    vocab:[
      {hz:'红色',py:'hóngsè',vi:'màu đỏ',emoji:'🔴'},
      {hz:'橙色',py:'chéngsè',vi:'màu cam',emoji:'🟠'},
      {hz:'黄色',py:'huángsè',vi:'màu vàng',emoji:'🟡'},
      {hz:'绿色',py:'lǜsè',vi:'màu xanh lá',emoji:'🟢'},
      {hz:'蓝色',py:'lánsè',vi:'màu xanh dương',emoji:'🔵'},
      {hz:'紫色',py:'zǐsè',vi:'màu tím',emoji:'🟣'},
      {hz:'粉红色',py:'fěnhóngsè',vi:'màu hồng',emoji:'🌸'},
      {hz:'黑色',py:'hēisè',vi:'màu đen',emoji:'⚫'},
      {hz:'白色',py:'báisè',vi:'màu trắng',emoji:'⚪'},
      {hz:'棕色',py:'zōngsè',vi:'màu nâu',emoji:'🟤'},
    ]},
  { id:'numbers', icon:'🔢', color:'#ffce3d', title:'Số đếm', cn:'数字 · Shùzì', modes:['cards','match','quiz','count'],
    vocab:[
      {hz:'零',py:'líng',vi:'số không',emoji:'0️⃣'},
      {hz:'一',py:'yī',vi:'một',emoji:'1️⃣'},
      {hz:'二',py:'èr',vi:'hai',emoji:'2️⃣'},
      {hz:'三',py:'sān',vi:'ba',emoji:'3️⃣'},
      {hz:'四',py:'sì',vi:'bốn',emoji:'4️⃣'},
      {hz:'五',py:'wǔ',vi:'năm',emoji:'5️⃣'},
      {hz:'六',py:'liù',vi:'sáu',emoji:'6️⃣'},
      {hz:'七',py:'qī',vi:'bảy',emoji:'7️⃣'},
      {hz:'八',py:'bā',vi:'tám',emoji:'8️⃣'},
      {hz:'九',py:'jiǔ',vi:'chín',emoji:'9️⃣'},
      {hz:'十',py:'shí',vi:'mười',emoji:'🔟'},
    ]},
  { id:'family', icon:'👨‍👩‍👧‍👦', color:'#57d68a', title:'Gia đình', cn:'家庭 · Jiātíng', modes:['cards','match','quiz','sentence'],
    vocab:[
      {hz:'爸爸',py:'bàba',vi:'bố',emoji:'👨'},
      {hz:'妈妈',py:'māma',vi:'mẹ',emoji:'👩'},
      {hz:'哥哥',py:'gēge',vi:'anh trai',emoji:'🧑'},
      {hz:'姐姐',py:'jiějie',vi:'chị gái',emoji:'👧'},
      {hz:'弟弟',py:'dìdi',vi:'em trai',emoji:'👦'},
      {hz:'妹妹',py:'mèimei',vi:'em gái',emoji:'👧'},
      {hz:'爷爷',py:'yéye',vi:'ông nội',emoji:'👴'},
      {hz:'奶奶',py:'nǎinai',vi:'bà nội',emoji:'👵'},
      {hz:'我',py:'wǒ',vi:'tôi, con',emoji:'🧒'},
      {hz:'家',py:'jiā',vi:'nhà, gia đình',emoji:'🏠'},
    ],
    sentences:[
      {situation:'Bạn muốn giới thiệu đây là bố của mình.', correct:'这是我爸爸。', options:['这是我爸爸。','这是我妈妈。','这是我哥哥。','这是我奶奶。']},
      {situation:'Bạn muốn nói đây là mẹ của mình.', correct:'这是我妈妈。', options:['这是我妈妈。','这是我爸爸。','这是我姐姐。','这是我爷爷。']},
      {situation:'Bạn muốn giới thiệu đây là em gái của mình.', correct:'这是我妹妹。', options:['这是我妹妹。','这是我弟弟。','这是我哥哥。','这是我姐姐。']},
      {situation:'Bạn muốn giới thiệu đây là ông nội của mình.', correct:'这是我爷爷。', options:['这是我爷爷。','这是我奶奶。','这是我爸爸。','这是我妈妈。']},
      {situation:'Bạn muốn nói đây là nhà của mình.', correct:'这是我家。', options:['这是我家。','这是我爸爸。','这是我妹妹。','这是我哥哥。']},
    ]},
  { id:'self', icon:'🙋', color:'#4bc3e0', title:'Giới thiệu bản thân', cn:'自我介绍 · Zìwǒ jièshào', modes:['cards','match','quiz','sentence'],
    vocab:[
      {hz:'你好',py:'nǐ hǎo',vi:'xin chào',emoji:'👋'},

/* =========================================================
   TIẾN ĐỘ (localStorage)
   ========================================================= */
const STORE_KEY = 'ttk_kids_progress_v1';
let progress = {};
try{ progress = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ progress = {}; }
function saveProgress(){ localStorage.setItem(STORE_KEY, JSON.stringify(progress)); }
function getStars(id){ return progress[id] || 0; }
function setStars(id, n){ progress[id] = Math.max(getStars(id), n); saveProgress(); renderTotalStars(); }
function renderTotalStars(){
  const total = topics.reduce((s,t)=> s + getStars(t.id), 0);
  document.getElementById('total-stars').textContent = total;
}

/* =========================================================
   HELPERS
   ========================================================= */
function shuffle(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pickN(arr, n){ return shuffle(arr).slice(0, Math.min(n, arr.length)); }
function starsFromPct(pct){ if(pct >= 90) return 3; if(pct >= 60) return 2; if(pct > 0) return 1; return 0; }

function confettiBurst(x, y, colors){
  const layer = document.getElementById('confetti-layer');
  const cols = colors || ['#ff6f6f','#ffce3d','#57d68a','#4bc3e0','#b18cf2','#ff8fc7'];
  for(let i=0;i<26;i++){
    const el = document.createElement('div');
    el.className = 'confetto';
    const size = 6 + Math.random()*6;
    el.style.width = size + 'px'; el.style.height = (size*0.4+size) + 'px';
    el.style.background = cols[Math.floor(Math.random()*cols.length)];
    el.style.left = (x + (Math.random()*160-80)) + 'px';
    el.style.top = (y - 10) + 'px';
    el.style.animationDuration = (1.6 + Math.random()*1.2) + 's';
    layer.appendChild(el);
    setTimeout(()=> el.remove(), 3000);
  }
}
function confettiCenterBurst(){
  confettiBurst(window.innerWidth/2, window.innerHeight*0.3);
  setTimeout(()=> confettiBurst(window.innerWidth*0.25, window.innerHeight*0.25), 150);
  setTimeout(()=> confettiBurst(window.innerWidth*0.75, window.innerHeight*0.25), 300);
}

/* =========================================================
   TOPIC VIEW
   ========================================================= */
const homeView = document.getElementById('home-view');
const topicView = document.getElementById('topic-view');
const gamePanel = document.getElementById('game-panel');
let currentTopic = null;
let currentMode = null;

function openTopic(id){
  currentTopic = topics.find(t=>t.id===id);
  homeView.style.display = 'none';
  topicView.style.display = 'block';
  document.getElementById('topic-cn').textContent = currentTopic.cn;
  document.getElementById('topic-title').textContent = currentTopic.icon + '  ' + currentTopic.title;
  const tabs = document.getElementById('mode-tabs');
  tabs.innerHTML = '';
  currentTopic.modes.forEach(m=>{
    const b = document.createElement('button');
    b.className = 'mode-tab';
    b.textContent = modeMeta[m].label;
    b.addEventListener('click', ()=> setMode(m, b));
    tabs.appendChild(b);
  });
  setMode(currentTopic.modes[0], tabs.firstChild);
  window.scrollTo({top:0, behavior:'smooth'});
}
document.getElementById('back-btn').addEventListener('click', ()=>{
  topicView.style.display = 'none';
  homeView.style.display = 'block';
  renderHome();
});

function setMode(mode, btnEl){
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b=> { b.classList.remove('active'); b.style.background=''; b.style.color=''; });
  if(btnEl){ btnEl.classList.add('active'); btnEl.style.background = currentTopic.color; btnEl.style.color = '#fff'; }
  if(mode==='cards') renderFlashcards();
  else if(mode==='match') renderMatch();
  else if(mode==='quiz') renderQuiz();
  else if(mode==='count') renderCount();
  else if(mode==='sentence') renderSentence();
  else if(mode==='shop') renderShop();
  else if(mode==='order') renderOrder();
}

function showResult(pct, correctCount, totalCount){
  const stars = starsFromPct(pct);
  setStars(currentTopic.id, stars);
  const starsHtml = [1,2,3].map(n => n<=stars ? '⭐' : '☆').join('');
  gamePanel.innerHTML = `
    <div class="result-panel">
      <div class="stars-big">${starsHtml}</div>
      <div class="score-line">Bạn đúng ${correctCount}/${totalCount} câu (${pct}%)</div>
      <div class="cheer">${stars===3?'Xuất sắc luôn! 🏆':stars===2?'Giỏi lắm! 👏':'Cố lên nào, chơi lại nhé! 💪'}</div>
      <div class="action-row">
        <button class="pill-btn primary" id="retry-btn">🔄 Chơi lại</button>
        <button class="pill-btn secondary" id="map-btn">🗺️ Về bản đồ</button>
      </div>
    </div>
  `;
  if(stars>=2) confettiCenterBurst();
  document.getElementById('retry-btn').addEventListener('click', ()=> setMode(currentMode, document.querySelector('.mode-tab.active')));
  document.getElementById('map-btn').addEventListener('click', ()=>{
    topicView.style.display = 'none'; homeView.style.display = 'block'; renderHome();
  });
}

        </div></div>
        <div class="flash-nav">
          <button class="nav-btn" id="fc-prev">◀</button>

  draw();
}

/* ---------- MATCH GAME ---------- */
function renderMatch(){
  const set = pickN(currentTopic.vocab, Math.min(8, currentTopic.vocab.length));
  let matched = new Set();
  let selectedIdx = null;
  const rightShuffled = shuffle(set.map((v,i)=>({...v, idx:i})));
  gamePanel.innerHTML = `
    <p style="text-align:center;font-weight:700;color:var(--ink-soft);margin-top:0;">Chọn 1 ô bên trái rồi chọn nghĩa đúng bên phải nhé!</p>
    <div class="match-grid">
      <div class="match-col" id="match-left"></div>
      <div class="match-col" id="match-right"></div>
    </div>
  `;
  const left = document.getElementById('match-left');
  const right = document.getElementById('match-right');
  set.forEach((v,i)=>{
    const el = document.createElement('div');
    el.className = 'tile'; el.dataset.idx = i;
    el.innerHTML = `<div class="em">${v.emoji}</div>${v.hz}`;
    el.addEventListener('click', ()=>{
      if(el.classList.contains('matched')) return;
      left.querySelectorAll('.tile').forEach(x=>x.classList.remove('selected'));
      el.classList.add('selected'); selectedIdx = i;
    });
    left.appendChild(el);
  });
  rightShuffled.forEach(v=>{
    const el = document.createElement('div');
    el.className = 'tile'; el.dataset.idx = v.idx;
    el.textContent = v.vi;
    el.addEventListener('click', ()=>{
      if(el.classList.contains('matched') || selectedIdx===null) return;
      const leftEl = left.querySelector(`.tile[data-idx="${selectedIdx}"]`);
      if(selectedIdx === v.idx){
        leftEl.classList.remove('selected'); leftEl.classList.add('matched'); el.classList.add('matched');
        matched.add(v.idx); selectedIdx = null;
        if(matched.size === set.length){
          const rect = el.getBoundingClientRect(); confettiBurst(rect.left, rect.top);
          setTimeout(()=> showResult(100, set.length, set.length), 500);
        }
      } else {
        el.classList.add('wrongflash');
        setTimeout(()=> el.classList.remove('wrongflash'), 450);
      }
    });
    right.appendChild(el);
  });
}

/* ---------- QUIZ (đố vui trắc nghiệm) ---------- */
function renderQuiz(){
  const vocab = currentTopic.vocab;
  const total = Math.min(8, vocab.length);
  const questions = pickN(vocab, total);
  let qi = 0, correct = 0;
  function draw(){
    if(qi >= questions.length){ showResult(Math.round(correct/total*100), correct, total); return; }
    const target = questions[qi];
    const modeRoll = Math.random();
    let promptEmoji, promptMain, promptSub, correctVal, field;
    if(modeRoll < 0.5){
      promptEmoji = target.emoji; promptMain = target.hz; promptSub = target.py;
      correctVal = target.vi; field = 'vi';
    } else {
      promptEmoji = target.emoji; promptMain = target.vi; promptSub = '';
      correctVal = target.hz; field = 'hz';
    }
    const distractors = shuffle(vocab.filter(v=>v!==target)).slice(0,3).map(v=>v[field]);
    const opts = shuffle([correctVal, ...distractors]);
    gamePanel.innerHTML = `
      <div class="quiz-progress">Câu ${qi+1} / ${questions.length}</div>
      <div class="quiz-prompt">
        <div class="qp-emoji">${promptEmoji}</div>
        <div class="qp-main">${promptMain}</div>
        ${promptSub? `<div class="qp-sub">${promptSub}</div>`:''}
      </div>
      <div class="quiz-options" id="quiz-opts"></div>
    `;
    const optsWrap = document.getElementById('quiz-opts');
    opts.forEach(opt=>{
      const b = document.createElement('button');
      b.className = 'opt-btn'; b.textContent = opt;
      b.addEventListener('click', ()=>{
        optsWrap.querySelectorAll('.opt-btn').forEach(x=> x.disabled = true);
        if(opt === correctVal){
          b.classList.add('correct'); correct++;
          const rect = b.getBoundingClientRect(); confettiBurst(rect.left+rect.width/2, rect.top);
        } else {
          b.classList.add('wrong');
          optsWrap.querySelectorAll('.opt-btn').forEach(x=>{ if(x.textContent===correctVal) x.classList.add('correct'); });
        }
        setTimeout(()=>{ qi++; draw(); }, 850);
      });
      optsWrap.appendChild(b);
    });
  }
  draw();
}

/* ---------- COUNT GAME (numbers only) ---------- */
const countEmojiPool = ['🍎','⭐','🎈','🐟','🍓','🍌','🌸','🐶'];
function renderCount(){
  const vocab = currentTopic.vocab; // index n = number n (0..10)
  const rounds = 6;
  let ri = 0, correct = 0;
  function draw(){
    if(ri >= rounds){ showResult(Math.round(correct/rounds*100), correct, rounds); return; }
    const n = 1 + Math.floor(Math.random()*10);
    const emoji = countEmojiPool[Math.floor(Math.random()*countEmojiPool.length)];
    const correctVal = vocab[n].hz;
    const distractors = shuffle(vocab.filter((v,i)=> i!==n && i<=10)).slice(0,3).map(v=>v.hz);
    const opts = shuffle([correctVal, ...distractors]);
    gamePanel.innerHTML = `
      <div class="quiz-progress">Câu ${ri+1} / ${rounds}</div>
      <p style="text-align:center;font-weight:700;">Có mấy cái ${emoji} vậy nhỉ? 🤔</p>
      <div class="count-emojis">${emoji.repeat(n)}</div>
      <div class="quiz-options" id="count-opts"></div>
    `;
    const wrap = document.getElementById('count-opts');
    opts.forEach(opt=>{
      const b = document.createElement('button');
      b.className = 'opt-btn'; b.textContent = opt;
      b.addEventListener('click', ()=>{
        wrap.querySelectorAll('.opt-btn').forEach(x=> x.disabled = true);
        if(opt === correctVal){ b.classList.add('correct'); correct++; const rect=b.getBoundingClientRect(); confettiBurst(rect.left+rect.width/2, rect.top); }
        else { b.classList.add('wrong'); wrap.querySelectorAll('.opt-btn').forEach(x=>{ if(x.textContent===correctVal) x.classList.add('correct'); }); }
        setTimeout(()=>{ ri++; draw(); }, 850);
      });
      wrap.appendChild(b);
    });
  }
  draw();
}

/* ---------- SENTENCE QUIZ (family / self / like) ---------- */
function renderSentence(){
  const bank = shuffle(currentTopic.sentences);
  let qi = 0, correct = 0;
  function draw(){
    if(qi >= bank.length){ showResult(Math.round(correct/bank.length*100), correct, bank.length); return; }
    const q = bank[qi];
    const opts = shuffle(q.options);
    gamePanel.innerHTML = `
      <div class="quiz-progress">Câu ${qi+1} / ${bank.length}</div>
      <div class="sentence-situation">💭 ${q.situation}</div>
      <div class="sentence-options" id="sent-opts"></div>
    `;
    const wrap = document.getElementById('sent-opts');
    opts.forEach(opt=>{
      const b = document.createElement('button');
      b.className = 'opt-btn'; b.textContent = opt;
      b.addEventListener('click', ()=>{
        wrap.querySelectorAll('.opt-btn').forEach(x=> x.disabled = true);
        if(opt === q.correct){ b.classList.add('correct'); correct++; const rect=b.getBoundingClientRect(); confettiBurst(rect.left+rect.width/2, rect.top); }
        else { b.classList.add('wrong'); wrap.querySelectorAll('.opt-btn').forEach(x=>{ if(x.textContent===q.correct) x.classList.add('correct'); }); }
        setTimeout(()=>{ qi++; draw(); }, 900);
      });
      wrap.appendChild(b);
    });
  }
  draw();
}

/* ---------- SHOP GAME (shopping only) ---------- */
function renderShop(){
  const vocab = currentTopic.vocab;
  const rounds = 6;
  let ri = 0, correct = 0;
  function draw(){
    if(ri >= rounds){ showResult(Math.round(correct/rounds*100), correct, rounds); return; }
    const target = pickN(vocab, 1)[0];
    const others = shuffle(vocab.filter(v=>v!==target)).slice(0,5);
    const items = shuffle([target, ...others]);
    gamePanel.innerHTML = `
      <div class="quiz-progress">Lượt ${ri+1} / ${rounds}</div>
      <div class="shop-prompt">🛒 Hãy mua: <span class="sp-cn">${target.hz}</span><br><small style="color:var(--ink-soft);font-weight:600;">${target.vi} (${target.py})</small></div>
      <div class="shop-grid" id="shop-grid"></div>
      <div class="shop-cart">🧺 Đã mua: <span id="shop-count">${correct}</span> món</div>
    `;
    const grid = document.getElementById('shop-grid');
    items.forEach(it=>{
      const b = document.createElement('div');
      b.className = 'shop-item';
      b.innerHTML = `<span class="em">${it.emoji}</span>${it.vi}`;
      b.addEventListener('click', ()=>{
        grid.querySelectorAll('.shop-item').forEach(x=> x.style.pointerEvents='none');
        if(it === target){ b.classList.add('correct'); correct++; const rect=b.getBoundingClientRect(); confettiBurst(rect.left+rect.width/2, rect.top); }
        else { b.classList.add('wrong'); grid.querySelectorAll('.shop-item').forEach(x=>{ if(x.textContent.includes(target.vi)) x.classList.add('correct'); }); }
        setTimeout(()=>{ ri++; draw(); }, 850);
      });
      grid.appendChild(b);
    });
  }
  draw();
}

/* ---------- ORDER GAME (daily activities only) ---------- */
function renderOrder(){
  const set = pickN(currentTopic.vocab, 6).sort((a,b)=> a.time-b.time);
  const pool = shuffle(set);
  let nextTime = 0; // index into set (0..5) expecting set[nextTime]
  gamePanel.innerHTML = `
    <p style="text-align:center;font-weight:700;color:var(--ink-soft);margin-top:0;">Bấm các hoạt động theo đúng thứ tự trong ngày nhé! ⏰➡️🌙</p>
    <div class="order-track" id="order-track"></div>
    <div class="order-pool" id="order-pool"></div>
  `;
  const track = document.getElementById('order-track');
  const poolEl = document.getElementById('order-pool');
  set.forEach(()=>{ const s = document.createElement('div'); s.className='slot'; s.textContent='?'; track.appendChild(s); });
  pool.forEach(v=>{
    const card = document.createElement('div');
    card.className = 'order-card';
    card.innerHTML = `<span class="em">${v.emoji}</span>${v.hz}<br><small style="color:var(--ink-soft);font-weight:600;">${v.vi}</small>`;
    card.addEventListener('click', ()=>{
      if(card.classList.contains('used')) return;
      if(v.time === set[nextTime].time){
        card.classList.add('used');
        const slot = track.children[nextTime];
        slot.textContent = v.emoji; slot.classList.add('filled');
        nextTime++;
        if(nextTime === set.length){
          confettiCenterBurst();
          setTimeout(()=> showResult(100, set.length, set.length), 500);
        }
      } else {
        card.classList.add('shake');
        setTimeout(()=> card.classList.remove('shake'), 400);
      }
    });
    poolEl.appendChild(card);
  });
}
</script>
